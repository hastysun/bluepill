<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="pcb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a6b"/>
      <stop offset="100%" stop-color="#0d2246"/>
    </linearGradient>
    <linearGradient id="usb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <radialGradient id="pin" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#d4a54a"/>
      <stop offset="100%" stop-color="#6b4a18"/>
    </radialGradient>
    <filter id="boardShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.55"/>
    </filter>
    <style><![CDATA[
      .title     { font-size: 28px; font-weight: 700; fill: #f1f5f9; letter-spacing: 0.3px; }
      .subtitle  { font-size: 14px; fill: #94a3b8; letter-spacing: 0.4px; }
      .chip      { font-size: 13px; font-weight: 600; fill: #d6e0ec;
                   font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace; }
      .sig       { font-size: 15px; font-weight: 600; }
      .sig-sub   { font-size: 11px; fill: #94a3b8; font-weight: 400; }
      .legend    { font-size: 14px; fill: #e2e8f0; font-weight: 500; }
      .legend-h  { font-size: 14px; font-weight: 700; fill: #cbd5e1; letter-spacing: 1.4px; }
      .silk      { fill: #6a85ae; font-size: 11px; font-family: ui-monospace, monospace; letter-spacing: 0.6px; }
      .silk-mcu  { fill: #a8beda; font-size: 15px; font-family: ui-monospace, monospace; font-weight: 700; letter-spacing: 1.4px; }
      .btn   { fill: #c4b5fd; }
      .enc   { fill: #6ee7b7; }
      .led   { fill: #fcd34d; }
      .usb   { fill: #93c5fd; }
      .pwr   { fill: #e2e8f0; }
      .gnd   { fill: #cbd5e1; }
      .dim   { fill: #64748b; }
    ]]></style>
  </defs>

  <rect width="820" height="1140" fill="#0b1220"/>

  <text x="410" y="52" text-anchor="middle" class="title">STM32F103C8T6 Blue Pill — Pin Allocation</text>
  <text x="410" y="78" text-anchor="middle" class="subtitle">all_encoders variant · 4 buttons + 7 encoders · WeAct Blue Pill Plus</text>

  <rect x="320" y="100" width="180" height="52" rx="5" fill="url(#usb)" stroke="#1e293b" stroke-width="1"/>
  <rect x="338" y="116" width="144" height="22" rx="2" fill="#1a1f2e"/>
  <text x="410" y="132" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="ui-monospace, monospace">USB-C</text>

  <rect x="250" y="140" width="320" height="910" rx="14" fill="url(#pcb)" filter="url(#boardShadow)"
        stroke="#1e40af" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="274" y="164" width="272" height="862" rx="8" fill="none"
        stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.22"/>

  <text x="410" y="570" text-anchor="middle" class="silk-mcu">STM32F103C8T6</text>
  <text x="410" y="592" text-anchor="middle" class="silk">button_box firmware</text>

  <text x="410" y="430" text-anchor="middle" class="silk">BOOT0 button (mid-board)</text>
  <text x="410" y="448" text-anchor="middle" class="silk" fill="#fca5a5">PB2 = heartbeat LED (BOOT1 pad)</text>

  <text x="410" y="750" text-anchor="middle" class="silk" fill="#fca5a5">PA13 = SWDIO · PA14 = SWCLK</text>
  <text x="410" y="768" text-anchor="middle" class="silk" fill="#7c8ba3">SWD header: right edge of board</text>

  <!-- LEFT COLUMN: PB12 PB13 PB14 PB15 PA8 PA9 PA10 PA11 PA12 PA15 PB3 PB4 PB5 PB6 PB7 PB8 PB9 5V GND 3V3 -->
  <g>
    <circle cx="250" cy="230" r="6" fill="url(#pin)"/>
    <text x="268" y="234" class="chip">PB12</text>
    <text x="238" y="234" text-anchor="end" class="sig enc">Encoder 2 A</text>

    <circle cx="250" cy="268" r="6" fill="url(#pin)"/>
    <text x="268" y="272" class="chip">PB13</text>
    <text x="238" y="272" text-anchor="end" class="sig enc">Encoder 2 B</text>

    <circle cx="250" cy="306" r="6" fill="url(#pin)"/>
    <text x="268" y="310" class="chip">PB14</text>
    <text x="238" y="310" text-anchor="end" class="sig enc">Encoder 2 Push</text>

    <circle cx="250" cy="344" r="6" fill="url(#pin)"/>
    <text x="268" y="348" class="chip">PB15</text>
    <text x="238" y="348" text-anchor="end" class="sig btn">Button 4</text>

    <circle cx="250" cy="382" r="6" fill="url(#pin)"/>
    <text x="268" y="386" class="chip">PA8</text>
    <text x="238" y="386" text-anchor="end" class="sig enc">Encoder 1 A</text>

    <circle cx="250" cy="420" r="6" fill="url(#pin)"/>
    <text x="268" y="424" class="chip">PA9</text>
    <text x="238" y="424" text-anchor="end" class="sig enc">Encoder 1 B</text>

    <circle cx="250" cy="458" r="6" fill="url(#pin)"/>
    <text x="268" y="462" class="chip">PA10</text>
    <text x="238" y="462" text-anchor="end" class="sig enc">Encoder 1 Push</text>

    <circle cx="250" cy="496" r="6" fill="url(#pin)"/>
    <text x="268" y="500" class="chip">PA11</text>
    <text x="238" y="500" text-anchor="end" class="sig usb">USB D−</text>

    <circle cx="250" cy="534" r="6" fill="url(#pin)"/>
    <text x="268" y="538" class="chip">PA12</text>
    <text x="238" y="538" text-anchor="end" class="sig usb">USB D+</text>

    <circle cx="250" cy="572" r="6" fill="url(#pin)"/>
    <text x="268" y="576" class="chip">PA15</text>
    <text x="238" y="576" text-anchor="end" class="sig enc">Encoder 5 A</text>

    <circle cx="250" cy="610" r="6" fill="url(#pin)"/>
    <text x="268" y="614" class="chip">PB3</text>
    <text x="238" y="614" text-anchor="end" class="sig enc">Encoder 5 B</text>

    <circle cx="250" cy="648" r="6" fill="url(#pin)"/>
    <text x="268" y="652" class="chip">PB4</text>
    <text x="238" y="652" text-anchor="end" class="sig enc">Encoder 5 Push</text>

    <circle cx="250" cy="686" r="6" fill="url(#pin)"/>
    <text x="268" y="690" class="chip">PB5</text>
    <text x="238" y="690" text-anchor="end" class="sig enc">Encoder 6 A</text>

    <circle cx="250" cy="724" r="6" fill="url(#pin)"/>
    <text x="268" y="728" class="chip">PB6</text>
    <text x="238" y="728" text-anchor="end" class="sig enc">Encoder 6 B</text>

    <circle cx="250" cy="762" r="6" fill="url(#pin)"/>
    <text x="268" y="766" class="chip">PB7</text>
    <text x="238" y="766" text-anchor="end" class="sig enc">Encoder 6 Push</text>

    <circle cx="250" cy="800" r="6" fill="url(#pin)"/>
    <text x="268" y="804" class="chip">PB8</text>
    <text x="238" y="804" text-anchor="end" class="sig btn">Button 2</text>

    <circle cx="250" cy="838" r="6" fill="url(#pin)"/>
    <text x="268" y="842" class="chip">PB9</text>
    <text x="238" y="842" text-anchor="end" class="sig btn">Button 3</text>

    <circle cx="250" cy="876" r="6" fill="#e2e8f0"/>
    <text x="268" y="880" class="chip">5V</text>
    <text x="238" y="880" text-anchor="end" class="sig pwr">+5 V</text>

    <circle cx="250" cy="914" r="6" fill="#475569"/>
    <text x="268" y="918" class="chip">GND</text>
    <text x="238" y="918" text-anchor="end" class="sig gnd">GND</text>

    <circle cx="250" cy="952" r="6" fill="#fbbf24"/>
    <text x="268" y="956" class="chip">3V3</text>
    <text x="238" y="956" text-anchor="end" class="sig pwr">+3.3 V</text>
  </g>

  <!-- RIGHT COLUMN: 5V GND 3V3 RST PB11 PB10 PB1 PB0 PA7 PA6 PA5 PA4 PA3 PA2 PA1 PA0 PC15 PC14 PC13 VBAT -->
  <g>
    <circle cx="570" cy="230" r="6" fill="#e2e8f0"/>
    <text x="552" y="234" text-anchor="end" class="chip">5V</text>
    <text x="582" y="234" class="sig pwr">+5 V</text>

    <circle cx="570" cy="268" r="6" fill="#475569"/>
    <text x="552" y="272" text-anchor="end" class="chip">GND</text>
    <text x="582" y="272" class="sig gnd">GND</text>

    <circle cx="570" cy="306" r="6" fill="#fbbf24"/>
    <text x="552" y="310" text-anchor="end" class="chip">3V3</text>
    <text x="582" y="310" class="sig pwr">+3.3 V</text>

    <circle cx="570" cy="344" r="6" fill="#dc2626"/>
    <text x="552" y="348" text-anchor="end" class="chip">RST</text>
    <text x="582" y="348" class="sig pwr">Reset</text>

    <circle cx="570" cy="382" r="6" fill="url(#pin)"/>
    <text x="552" y="386" text-anchor="end" class="chip">PB11</text>
    <text x="582" y="386" class="sig enc">Encoder 7 A</text>

    <circle cx="570" cy="420" r="6" fill="url(#pin)"/>
    <text x="552" y="424" text-anchor="end" class="chip">PB10</text>
    <text x="582" y="424" class="sig enc">Encoder 7 B</text>

    <circle cx="570" cy="458" r="6" fill="url(#pin)"/>
    <text x="552" y="462" text-anchor="end" class="chip">PB1</text>
    <text x="582" y="462" class="sig enc">Encoder 7 Push</text>

    <circle cx="570" cy="496" r="6" fill="url(#pin)"/>
    <text x="552" y="500" text-anchor="end" class="chip">PB0</text>
    <text x="582" y="500" class="sig btn">Button 1</text>

    <circle cx="570" cy="534" r="6" fill="url(#pin)"/>
    <text x="552" y="538" text-anchor="end" class="chip">PA7</text>
    <text x="582" y="538" class="sig enc">Encoder 3 Push</text>

    <circle cx="570" cy="572" r="6" fill="url(#pin)"/>
    <text x="552" y="576" text-anchor="end" class="chip">PA6</text>
    <text x="582" y="576" class="sig enc">Encoder 3 B</text>

    <circle cx="570" cy="610" r="6" fill="url(#pin)"/>
    <text x="552" y="614" text-anchor="end" class="chip">PA5</text>
    <text x="582" y="614" class="sig enc">Encoder 3 A</text>

    <circle cx="570" cy="648" r="6" fill="url(#pin)"/>
    <text x="552" y="648" text-anchor="end" class="chip">PA4</text>
    <text x="582" y="643" class="sig led">LED 2</text>
    <text x="582" y="658" class="sig-sub">encoder activity</text>

    <circle cx="570" cy="686" r="6" fill="url(#pin)"/>
    <text x="552" y="686" text-anchor="end" class="chip">PA3</text>
    <text x="582" y="681" class="sig led">LED 1</text>
    <text x="582" y="696" class="sig-sub">USB connected</text>

    <circle cx="570" cy="724" r="6" fill="url(#pin)"/>
    <text x="552" y="728" text-anchor="end" class="chip">PA2</text>
    <text x="582" y="728" class="sig enc">Encoder 4 Push</text>

    <circle cx="570" cy="762" r="6" fill="url(#pin)"/>
    <text x="552" y="766" text-anchor="end" class="chip">PA1</text>
    <text x="582" y="766" class="sig enc">Encoder 4 B</text>

    <circle cx="570" cy="800" r="6" fill="url(#pin)"/>
    <text x="552" y="804" text-anchor="end" class="chip">PA0</text>
    <text x="582" y="804" class="sig enc">Encoder 4 A</text>

    <circle cx="570" cy="838" r="6" fill="url(#pin)" opacity="0.55"/>
    <text x="552" y="842" text-anchor="end" class="chip">PC15</text>
    <text x="582" y="842" class="sig dim">Free</text>

    <circle cx="570" cy="876" r="6" fill="url(#pin)" opacity="0.55"/>
    <text x="552" y="880" text-anchor="end" class="chip">PC14</text>
    <text x="582" y="880" class="sig dim">Free</text>

    <circle cx="570" cy="914" r="6" fill="url(#pin)" opacity="0.55"/>
    <text x="552" y="918" text-anchor="end" class="chip">PC13</text>
    <text x="582" y="918" class="sig dim">Free</text>

    <circle cx="570" cy="952" r="6" fill="#fbbf24"/>
    <text x="552" y="956" text-anchor="end" class="chip">VBAT</text>
    <text x="582" y="956" class="sig pwr">VBAT</text>
  </g>

  <g transform="translate(60, 1085)">
    <text x="0" y="0" class="legend-h">LEGEND</text>
  </g>
  <g transform="translate(60, 1115)" font-size="14">
    <g><circle cx="8" cy="-4" r="6" class="btn"/><text x="22" y="0" class="legend">Buttons</text></g>
    <g transform="translate(110, 0)"><circle cx="8" cy="-4" r="6" class="enc"/><text x="22" y="0" class="legend">Encoders (×7)</text></g>
    <g transform="translate(255, 0)"><circle cx="8" cy="-4" r="6" class="led"/><text x="22" y="0" class="legend">LED</text></g>
    <g transform="translate(330, 0)"><circle cx="8" cy="-4" r="6" class="usb"/><text x="22" y="0" class="legend">USB</text></g>
    <g transform="translate(405, 0)"><circle cx="8" cy="-4" r="6" class="pwr"/><text x="22" y="0" class="legend">Power / GND</text></g>
  </g>
</svg>
